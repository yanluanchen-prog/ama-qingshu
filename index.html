<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>观影批 · 给阿嬷的情书</title>
<meta name="description" content="看完电影《给阿嬷的情书》,把你的观后感写成一封旧时侨批。一封观影批,替你道尽千言万语。">
<style>
  :root {
    --paper: #f3e7cf;
    --paper-deep: #e8d9b5;
    --paper-edge: #d4bd8d;
    --ink: #2c1810;
    --ink-light: #5a4635;
    --red: #b73329;
    --red-deep: #8b1e15;
    --line: rgba(183, 51, 41, 0.18);
    --shadow: rgba(44, 24, 16, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 20% 0%, #3a2618 0%, transparent 40%),
      radial-gradient(circle at 80% 100%, #2a1a10 0%, transparent 40%),
      #1f130a;
    color: var(--ink);
    font-family: "KaiTi", "STKaiti", "楷体", "SimKai", "FangSong", "仿宋", "思源宋体", "Source Han Serif SC", "Noto Serif SC", serif;
    font-size: 16px;
    line-height: 1.8;
    overflow-x: hidden;
  }

  .app {
    max-width: 560px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    position: relative;
  }

  /* Top title */
  .masthead {
    text-align: center;
    padding: 24px 0 20px;
    color: #f3e7cf;
  }
  .masthead .brand {
    font-size: 13px;
    letter-spacing: 8px;
    color: #c9a76e;
    margin-bottom: 10px;
    padding-left: 8px;
  }
  .masthead h1 {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #f3e7cf;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    margin-bottom: 6px;
  }
  .masthead .tagline {
    font-size: 14px;
    color: #c9a76e;
    letter-spacing: 2px;
    opacity: 0.9;
  }

  /* Input card */
  .input-card {
    background: var(--paper);
    border-radius: 2px;
    box-shadow:
      0 2px 8px var(--shadow),
      0 20px 40px rgba(0,0,0,0.3);
    padding: 24px 22px;
    margin-top: 24px;
    position: relative;
    background-image:
      repeating-linear-gradient(
        to right,
        transparent 0,
        transparent calc(100% / 12 - 1px),
        var(--line) calc(100% / 12 - 1px),
        var(--line) calc(100% / 12)
      );
    background-size: 100% 100%;
    border: 1px solid var(--paper-edge);
  }

  .input-label {
    font-size: 15px;
    color: var(--ink-light);
    margin-bottom: 14px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .input-label::before, .input-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  textarea {
    width: 100%;
    min-height: 120px;
    resize: vertical;
    border: 1px dashed rgba(139, 30, 21, 0.3);
    border-radius: 2px;
    padding: 14px;
    font-family: inherit;
    font-size: 17px;
    line-height: 1.7;
    background: rgba(255, 255, 255, 0.4);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--red); }
  textarea::placeholder {
    font-size: 13.5px;
    line-height: 1.5;
    color: rgba(90, 70, 53, 0.5);
    letter-spacing: 0.3px;
  }
  .char-count {
    text-align: right;
    font-size: 11px;
    color: var(--ink-light);
    margin-top: 6px;
    letter-spacing: 0.5px;
    opacity: 0.55;
    transition: opacity 0.15s;
  }
  .char-count b {
    color: var(--red-deep);
    opacity: 0.9;
    font-weight: 600;
  }
  .char-count.warn {
    opacity: 0.95;
  }
  .char-count.warn #charCount {
    color: var(--red-deep);
    font-weight: 700;
  }

  .hint {
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 10px;
    letter-spacing: 0.5px;
    opacity: 0.7;
  }

  .quick-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .quick-tags .tag {
    font-size: 11.5px;
    padding: 3px 9px;
    border: 1px solid rgba(139, 30, 21, 0.35);
    border-radius: 2px;
    color: var(--red-deep);
    background: rgba(255,255,255,0.4);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }
  .quick-tags .tag:active {
    background: var(--red);
    color: #fff;
  }

  /* Buttons */
  .translate-btn {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    font-family: inherit;
    font-size: 18px;
    letter-spacing: 6px;
    padding-left: 12px;
    background: var(--red);
    color: #f3e7cf;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    font-weight: 700;
    box-shadow: 0 2px 0 var(--red-deep);
    transition: all 0.1s;
  }
  .translate-btn:active {
    transform: translateY(1px);
    box-shadow: 0 1px 0 var(--red-deep);
  }
  .translate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Output card -- this is the shareable qiaopi */
  .output {
    margin-top: 28px;
    display: none;
    animation: fadeIn 0.6s ease;
  }
  .output.show { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .qiaopi-card {
    background: var(--paper);
    background-image:
      radial-gradient(circle at 25% 30%, rgba(139, 30, 21, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 75% 70%, rgba(139, 30, 21, 0.03) 0%, transparent 50%),
      repeating-linear-gradient(
        to right,
        transparent 0,
        transparent calc(100% / 14 - 1px),
        var(--line) calc(100% / 14 - 1px),
        var(--line) calc(100% / 14)
      );
    border: 2px solid var(--red-deep);
    box-shadow:
      inset 0 0 0 4px var(--paper),
      inset 0 0 0 5px var(--red),
      0 8px 30px rgba(0,0,0,0.4),
      0 30px 60px rgba(0,0,0,0.3);
    padding: 20px 18px;
    position: relative;
  }

  /* Decoration corners */
  .qiaopi-card::before, .qiaopi-card::after {
    content: "";
    position: absolute;
    width: 24px;
    height: 24px;
    border: 2px solid var(--red);
    opacity: 0.5;
  }
  .qiaopi-card::before {
    top: 10px; left: 10px;
    border-right: none;
    border-bottom: none;
  }
  .qiaopi-card::after {
    bottom: 10px; right: 10px;
    border-left: none;
    border-top: none;
  }

  .qiaopi-header {
    text-align: center;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 12px;
  }
  .qiaopi-header .stamp-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .postmark {
    width: 56px; height: 56px;
    border: 2px solid var(--red);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--red);
    line-height: 1.1;
    transform: rotate(-14deg);
    opacity: 0.82;
    letter-spacing: 0;
    padding: 2px;
    font-family: "STKaiti", "KaiTi", serif;
  }
  .postmark .mark-top { font-size: 10px; font-weight: 700; }
  .postmark .mark-mid { font-size: 12px; font-weight: 800; margin: 1px 0; }
  .postmark .mark-bot { font-size: 8px; }

  .stamp {
    width: 46px; height: 58px;
    background:
      repeating-linear-gradient(0deg,
        transparent 0, transparent 3px,
        #f3e7cf 3px, #f3e7cf 5px),
      linear-gradient(135deg, #d4b896, #c9a76e);
    border: 2px dashed rgba(139, 30, 21, 0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--red-deep);
    position: relative;
  }
  .stamp .s-label { font-size: 8px; margin-bottom: 2px; }
  .stamp .s-value { font-size: 14px; font-weight: 800; letter-spacing: 1px; }
  .stamp .s-bottom { font-size: 7px; margin-top: 2px; }

  .qiaopi-title {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--ink-light);
    padding-left: 6px;
  }

  /* Comparison layout: modern vs ancient */
  .compare-block {
    margin-bottom: 12px;
  }
  .compare-block .col-label {
    font-size: 11px;
    color: var(--red-deep);
    letter-spacing: 4px;
    padding-left: 4px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .compare-block .col-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .modern-text {
    font-family: "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--ink-light);
    padding: 6px 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
  }

  .divider-classic {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 14px 0 10px;
    color: var(--red);
    opacity: 0.7;
  }
  .divider-classic .line {
    flex: 1;
    height: 1px;
    background: var(--red);
    opacity: 0.4;
  }
  .divider-classic .mark {
    font-size: 14px;
    letter-spacing: 2px;
  }

  .ancient-text {
    font-size: 16.5px;
    line-height: 1.85;
    color: var(--ink);
    padding: 2px 4px 0;
    text-indent: 2em;
    white-space: pre-wrap;
    font-weight: 500;
  }
  .ancient-text .opening {
    display: block;
    text-indent: 0;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .ancient-text .body { display: block; }
  .ancient-text .closing {
    display: block;
    margin-top: 6px;
  }

  .signature-block {
    text-align: right;
    margin-top: 20px;
    padding-right: 8px;
    position: relative;
  }
  .signature-block .sig {
    font-size: 14.5px;
    color: var(--ink);
    line-height: 1.9;
  }
  .signature-block .date {
    font-size: 13px;
    color: var(--ink-light);
    margin-top: 2px;
  }

  .seal {
    position: absolute;
    right: 6px;
    top: -8px;
    width: 52px;
    height: 52px;
    border: 2.5px solid var(--red);
    background: rgba(183, 51, 41, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "STKaiti", serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--red);
    letter-spacing: 1px;
    transform: rotate(6deg);
    box-shadow: inset 0 0 0 1px rgba(183, 51, 41, 0.4);
  }
  .seal.vert {
    writing-mode: vertical-rl;
    letter-spacing: 2px;
  }

  .qiaopi-footer {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
    text-align: center;
    font-size: 11px;
    color: var(--ink-light);
    letter-spacing: 4px;
    padding-left: 4px;
    line-height: 1.8;
  }
  .qiaopi-footer .movie-line {
    color: var(--red-deep);
    font-weight: 700;
    letter-spacing: 5px;
    padding-left: 5px;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .qiaopi-footer .subline {
    font-size: 10px;
    opacity: 0.65;
    letter-spacing: 1px;
    padding: 0;
  }
  .qr-block {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .qr-block img {
    width: 66px;
    height: 66px;
    display: block;
    background: #fff;
    padding: 3px;
    border: 1.5px solid var(--red);
    flex-shrink: 0;
  }
  .qr-block .qr-label {
    text-align: left;
    line-height: 1.5;
  }
  .qr-block .qr-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--red-deep);
    letter-spacing: 4px;
    padding-left: 4px;
  }
  .qr-block .qr-sub {
    font-size: 10.5px;
    color: var(--ink-light);
    letter-spacing: 1.5px;
    padding-left: 1px;
    opacity: 0.75;
    margin-top: 2px;
  }

  /* Action buttons */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 18px;
  }
  .actions button {
    padding: 13px;
    font-family: inherit;
    font-size: 15px;
    letter-spacing: 3px;
    padding-left: 6px;
    border: 1px solid #c9a76e;
    background: transparent;
    color: #c9a76e;
    border-radius: 2px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }
  .actions button.primary {
    background: #c9a76e;
    color: #1f130a;
  }
  .actions button:active {
    transform: translateY(1px);
    opacity: 0.85;
  }
  .actions .full {
    grid-column: 1 / -1;
  }

  /* Share hint */
  .share-hint {
    background: rgba(201, 167, 110, 0.12);
    border: 1px dashed rgba(201, 167, 110, 0.4);
    color: #c9a76e;
    padding: 12px 14px;
    margin-top: 14px;
    border-radius: 2px;
    font-size: 13px;
    line-height: 1.7;
    text-align: center;
    letter-spacing: 1px;
  }

  /* Footer */
  .app-footer {
    margin-top: 40px;
    text-align: center;
    color: #c9a76e;
    opacity: 0.55;
    font-size: 11px;
    letter-spacing: 2px;
    line-height: 1.9;
  }

  /* Loading overlay · 信封仪式 */
  .loading {
    position: fixed;
    inset: 0;
    background: rgba(20, 12, 6, 0.72);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .loading.show { display: flex; }
  .envelope-scene {
    position: relative;
    width: 220px;
    text-align: center;
  }
  .envelope-float {
    position: relative;
    width: 200px;
    height: 130px;
    margin: 0 auto;
    animation: envFloat 2.6s ease-in-out infinite;
    filter: drop-shadow(0 10px 24px rgba(0,0,0,0.55));
  }
  @keyframes envFloat {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-10px) rotate(1deg); }
  }
  .envelope-svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .envelope-seal {
    position: absolute;
    top: 38px;
    right: 18px;
    width: 54px;
    height: 54px;
    border: 3px solid #b73329;
    background: rgba(183, 51, 41, 0.88);
    color: #f3e7cf;
    font-family: "STKaiti", "KaiTi", "楷体", serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    box-shadow: inset 0 0 0 1px rgba(243, 231, 207, 0.3), 0 2px 6px rgba(0,0,0,0.3);
    transform: rotate(-60deg) scale(3);
    opacity: 0;
    animation: sealStamp 0.9s 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.2) forwards;
  }
  @keyframes sealStamp {
    0%   { transform: rotate(-60deg) scale(3); opacity: 0; }
    40%  { opacity: 1; }
    60%  { transform: rotate(-8deg) scale(1.15); opacity: 1; }
    78%  { transform: rotate(-14deg) scale(0.92); }
    92%  { transform: rotate(-10deg) scale(1.04); }
    100% { transform: rotate(-12deg) scale(1); opacity: 1; }
  }
  .envelope-msg {
    margin-top: 26px;
    color: #c9a76e;
    font-size: 14px;
    letter-spacing: 7px;
    padding-left: 7px;
    animation: msgPulse 1.6s ease-in-out infinite;
  }
  @keyframes msgPulse {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }

  /* 批已送达 仪式 */
  .delivered {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 150;
    pointer-events: none;
  }
  .delivered.show {
    display: flex;
    animation: deliveredOverlay 1.8s ease-out forwards;
  }
  @keyframes deliveredOverlay {
    0% { background: rgba(20, 12, 6, 0); backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); }
    18% { background: rgba(20, 12, 6, 0.55); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
    82% { background: rgba(20, 12, 6, 0.55); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
    100% { background: rgba(20, 12, 6, 0); backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); }
  }
  .delivered-content {
    text-align: center;
  }
  .delivered-stamp {
    width: 130px;
    height: 130px;
    border: 5px solid #b73329;
    background: rgba(183, 51, 41, 0.12);
    color: #b73329;
    font-family: "STKaiti", "KaiTi", "楷体", serif;
    font-size: 44px;
    font-weight: 800;
    letter-spacing: 6px;
    padding-left: 6px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 0 2px rgba(183, 51, 41, 0.4), 0 4px 16px rgba(0,0,0,0.4);
    margin: 0 auto;
    opacity: 0;
    transform: rotate(-60deg) scale(2.2);
  }
  .delivered.show .delivered-stamp {
    animation: deliveredStamp 1.7s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards;
  }
  @keyframes deliveredStamp {
    0%   { transform: rotate(-60deg) scale(2.2); opacity: 0; }
    20%  { opacity: 1; }
    38%  { transform: rotate(-8deg) scale(1.15); opacity: 1; }
    52%  { transform: rotate(-14deg) scale(0.95); }
    66%  { transform: rotate(-10deg) scale(1.03); opacity: 1; }
    82%  { transform: rotate(-12deg) scale(1); opacity: 1; }
    100% { transform: rotate(-12deg) scale(1); opacity: 0; }
  }
  .delivered-msg {
    margin-top: 28px;
    color: #c9a76e;
    font-size: 16px;
    letter-spacing: 10px;
    padding-left: 10px;
    opacity: 0;
  }
  .delivered.show .delivered-msg {
    animation: deliveredMsg 1.7s ease-out forwards;
  }
  @keyframes deliveredMsg {
    0% { opacity: 0; transform: translateY(8px); }
    30% { opacity: 0; transform: translateY(8px); }
    55% { opacity: 1; transform: translateY(0); }
    82% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-4px); }
  }

  /* Toast */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 40px;
    transform: translateX(-50%);
    background: rgba(44, 24, 16, 0.94);
    color: #f3e7cf;
    padding: 10px 20px;
    border-radius: 2px;
    font-size: 14px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    letter-spacing: 1px;
    border: 1px solid #c9a76e;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 380px) {
    .masthead h1 { font-size: 32px; }
    .qiaopi-card { padding: 22px 18px; }
    .ancient-text { font-size: 16.5px; }
  }
</style>
</head>
<body>

<div class="app">

  <header class="masthead">
    <h1>观影批</h1>
    <div class="tagline">看完《给阿嬷的情书》<br>把感受写成一封侨批</div>
  </header>

  <section class="input-card">
    <div class="input-label">观影所感</div>
    <textarea id="input" maxlength="100" placeholder="看完电影,把你最想说的话写在这里"></textarea>
    <div class="char-count" id="charCountBox">建议 <b>20 - 80</b> 字 · <span id="charCount">0</span> / 100</div>
    <div class="quick-tags" id="quickTags">
      <span class="tag" data-text="本来就冲着喜剧来的,没想到笑点这么密,孙子跑去泰国找阿公那段真的笑不活了">看着看着就笑了</span>
      <span class="tag" data-text="前一秒还在笑,下一秒眼泪就掉下来,一封侨批一下子把我整破防了">笑着笑着就哭了</span>
      <span class="tag" data-text="阿嬷一个人默默扛了几十年,看完才懂她的坚强,必须给阿嬷打call">给阿嬷打call</span>

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function detectThemes(text) {
  const matched = [];
  for (const [key, theme] of Object.entries(THEMES)) {
    for (const kw of theme.keys) {
      if (text.includes(kw)) {
        matched.push(key);
        break;
      }
    }
  }
  return matched;
}

function translate(text) {
  const matched = detectThemes(text);
  const opening = pickRandom(OPENINGS);
  let bodyFrags = [];

  if (matched.length === 0) {
    bodyFrags = [pickRandom(TRANSITIONS), pickRandom(DEFAULTS)];
  } else {
    const pickedThemes = shuffle(matched).slice(0, Math.min(2, matched.length));
    bodyFrags.push(pickRandom(TRANSITIONS));
    for (const t of pickedThemes) {
      bodyFrags.push(pickRandom(THEMES[t].frags));
    }
  }

  // Occasionally add 汇款 flavor (real qiaopi always had money)
  if (Math.random() < 0.35) {
    bodyFrags.push(pickRandom(REMITS));
  }

  const closing = pickRandom(CLOSINGS);
  const signature = pickRandom(SIGNATURES);
  const year = pickRandom(YEARS);
  const month = pickRandom(MONTHS);
  const seal = pickRandom(SEALS);

  const body = bodyFrags.join('。') + '。';

  return {
    opening,
    body,
    closing,
    signature,
    date: `${year} ${month}`,
    year,
    seal
  };
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function showLoading(show) {
  const loading = $('loading');
  if (show) {
    // 重置盖章动画,每次送信都重新盖一次
    const seal = loading.querySelector('.envelope-seal');
    if (seal) {
      seal.style.animation = 'none';
      void seal.offsetWidth; // force reflow
      seal.style.animation = '';
    }
  }
  loading.classList.toggle('show', show);
}

function doTranslate() {
  const text = input.value.trim();
  if (!text) {
    showToast('请先写下你今日想说的话');
    input.focus();
    return;
  }
  lastInput = text;
  showLoading(true);

  // Artificial delay — part of the "ritual" of sending a letter
  setTimeout(() => {
    const result = translate(text);
    render(text, result);
    showLoading(false);
    output.classList.add('show');
    setTimeout(() => {
      output.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }, 1300);
}

function render(modern, result) {
  $('modernText').textContent = modern;
  $('ancientText').innerHTML =
    `<span class="body">${result.body}</span>` +
    `<span class="closing">${result.closing}</span>`;
  $('postmarkDate').textContent = result.year;
}

translateBtn.addEventListener('click', doTranslate);

input.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    doTranslate();
  }
});

      .replace(/fill="#000000"/g, 'fill="#8b1e15"')
      .replace(/fill="#ffffff"/g, 'fill="#f3e7cf"');
    $('qrImg').src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
  } catch (err) {
    console.error('QR generation failed:', err);
  }
})();

function updateCharCount() {
  const len = input.value.length;
  $('charCount').textContent = len;
  $('charCountBox').classList.toggle('warn', len >= 80);
}

input.addEventListener('input', updateCharCount);

// Quick tags
document.querySelectorAll('.quick-tags .tag').forEach(tag => {
  tag.addEventListener('click', () => {
    input.value = tag.dataset.text;
    input.focus();
    updateCharCount();
  });
});

// Regenerate
$('regenBtn').addEventListener('click', () => {
  if (!lastInput) return;
  showLoading(true);
  setTimeout(() => {
    const result = translate(lastInput);
    render(lastInput, result);
    showLoading(false);
    showToast('已换一版');
  }, 1100);
});

// 批已送达 仪式
function showDelivered() {
  const d = $('delivered');
  d.classList.remove('show');
  void d.offsetWidth; // 强制 reflow 重启动画
  d.classList.add('show');
  setTimeout(() => d.classList.remove('show'), 1800);
}

// Download image
$('downloadBtn').addEventListener('click', async () => {
  const card = $('shareCard');
  showLoading(true);
  try {
    const dataUrl = await htmlToImage.toPng(card, {
      pixelRatio: 2.5,
      backgroundColor: '#f3e7cf',
      cacheBust: true
    });
    // Download
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `侨批_${Date.now()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showLoading(false);
    // 批已送达 仪式(替代原 toast)
    showDelivered();
  } catch (err) {
    console.error(err);
    showLoading(false);
    showToast('保存失败,请长按图片保存');
  }
});
</script>
</body>
</html>
